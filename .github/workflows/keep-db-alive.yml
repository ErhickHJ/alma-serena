name: Keep DB Alive

on:
  schedule:
    - cron: "0 12 */2 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping database to prevent Supabase pause
        run: curl -sSf "https://almaserenaoficial.com/api/ping-db" || echo "Ping failed (DB may be paused)"
